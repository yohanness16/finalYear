name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  ACR_NAME: bustrack
  APP_NAME: bustrack-prod-api
  DOCKER_IMAGE: bustrack.azurecr.io/bustrack-api

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: cd-test-secret-key
      GOOGLE_CLIENT_ID: ""
      RESEND_API_KEY: ""
      APP_BASE_URL: https://bustrack.dpdns.org
      CORS_ORIGINS: "*"
      FIREWALL_ENABLED: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter
        run: |
          pip install ruff
          ruff check app/ --output-format=github

      - name: Run migrations
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          pytest -v --tb=short -x \
            --ignore=tests/test_crowd_endpoint.py \
            --ignore=tests/test_driver_bus_auth.py \
            --ignore=tests/test_route_direction.py \
            --ignore=tests/test_trip_history_ingestion.py \
            --ignore=tests/test_bus_gps_tracking.py \
            --ignore=tests/test_auth_case.py \
            --ignore=tests/test_image_pipeline.py

      - name: Verify OpenAPI spec
        run: |
          python -c "from app.main import app; app.openapi(); print('✅ OpenAPI spec valid')"

  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          TAG="${{ env.DOCKER_IMAGE }}:${SHORT_SHA}"
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://${{ env.APP_NAME }}.azurewebsites.net

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ needs.build-and-push.outputs.image_tag }}

      - name: Configure App Service environment variables
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.APP_NAME }}
          app-settings-json: |
            [
              {"name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}", "slotSetting": false},
              {"name": "REDIS_URL", "value": "${{ secrets.REDIS_URL }}", "slotSetting": false},
              {"name": "SECRET_KEY", "value": "${{ secrets.SECRET_KEY }}", "slotSetting": false},
              {"name": "GOOGLE_CLIENT_ID", "value": "${{ secrets.GOOGLE_CLIENT_ID }}", "slotSetting": false},
              {"name": "RESEND_API_KEY", "value": "${{ secrets.RESEND_API_KEY }}", "slotSetting": false},
              {"name": "RESEND_FROM_EMAIL", "value": "noreply@bustrack.dpdns.org", "slotSetting": false},
              {"name": "APP_BASE_URL", "value": "${{ secrets.APP_BASE_URL }}", "slotSetting": false},
              {"name": "CORS_ORIGINS", "value": "${{ secrets.CORS_ORIGINS }}", "slotSetting": false},
              {"name": "FIREWALL_ENABLED", "value": "true", "slotSetting": false},
              {"name": "TRUSTED_PROXY_IPS", "value": "*", "slotSetting": false},
              {"name": "WEBSITES_PORT", "value": "8000", "slotSetting": false}
            ]

      - name: Verify deployment
        run: |
          echo "Waiting for app to start..."
          sleep 30
          HEALTH_URL="https://api.bustrack.dpdns.org/health"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Deployment healthy! (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "❌ Deployment health check failed"
          exit 1

      - name: Azure Logout
        if: always()
        run: az logout