[tool.ruff]
target-version = "py312"
exclude = ["migrations", "scripts"]

[tool.ruff.lint]
ignore = [
    "B904",   # raise from err
    "B905",   # zip strict=
    "B017",   # pytest.raises(Exception)
    "SIM105", # contextlib.suppress
    "SIM117", # nested with statements
    "E402",   # module level import not at top
    "F841",   # unused variable
]
