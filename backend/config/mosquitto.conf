# Mosquitto MQTT Broker Configuration
# ──────────────────────────────────────────────────────────────────────────────
# Local development configuration for BusTrack ESP32 telemetry ingestion.
#
# Production: use TLS (port 8883), proper ACLs, and persistent sessions.
# ──────────────────────────────────────────────────────────────────────────────

# Standard MQTT port
listener 1883
protocol mqtt

# WebSocket port (for web-based MQTT clients / testing)
listener 9001
protocol websockets

# Authentication — require username/password
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# Connection limits
max_connections 100
max_keepalive 120

# Message limits (prevent abuse)
max_inflight_messages 20
max_queued_messages 100
message_size_limit 1048576
